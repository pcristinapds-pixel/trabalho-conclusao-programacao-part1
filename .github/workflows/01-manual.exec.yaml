# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: 'N1 - Execução Manual'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  testes-unitarios:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - name: Clonando o projeto
        uses: actions/checkout@v4


      # instalação do node
      - name: Instalando Node
        uses: actions/setup-node@v4
        with:
          node-version: latest      

      - name: Instalando Dependencias
        run: npm install

      # instalando mocha
      - name: Instalando Mocha
        run: npm i mocha

      # Executando testes
      - name: Executando testes unitarios
        run: npm test
        
      # Publicar resultados dos testes no GitHub
      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Resultados dos Testes Unitários
          path: './mochawesome-report/report.json'
          reporter: 'mochawesome'

      # Salvando relatório 
      - name: Salvando relatorio de execucao
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./mochawesome-report
          name: Relatório-Mochawesome