name: 'N3 - Execução por push'

on:
  push:
    branches:
      - main


jobs:
  testes-unitarios:
    runs-on: ubuntu-latest

    steps:
      - name: Clonando o projeto
        uses: actions/checkout@v4

      - name: Instalando Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalando Dependências
        run: npm install

      - name: Instalando Mocha e Mochawesome
        run: npm install mocha mochawesome --save-dev

      - name: Executando testes unitários
        run: npm test
        
      # Publicando resultados dos testes
      - name: Publicar resultados dos testes
        uses: daun/action-publish-unit-test-result-files@v3
        if: ${{ always() }}
        with:
          files: mochawesome-report/report.json
          check_name: Resultados dos Testes Unitários

      # Salvando relatório 
      - name: Salvando relatorio de execucao
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./mochawesome-report
          name: Relatório-Mochawesome