name: 'N3 - Execução por push'

on:
  push:
    branches:
      - main


jobs:
  testes-unitarios:
    runs-on: ubuntu-latest

    steps:
      - name: Clonando o projeto
        uses: actions/checkout@v4

      - name: Instalando Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalando Dependências
        run: npm install

      - name: Instalando Mocha e Mochawesome
        run: npm install mocha mochawesome --save-dev

      - name: Executando testes unitários
        run: npm test

      # Publicar resultados dos testes no GitHub
      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Resultados dos Testes Unitários
          path: './mochawesome-report/report.json'
          reporter: 'mochawesome'

      # Salvando relatório 
      - name: Salvando relatorio de execucao
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./mochawesome-report
          name: Relatório-Mochawesome